name: timeoff-manager

services:
  db:
    image: postgres:16-alpine
    container_name: timeoff-db
    environment:
      POSTGRES_USER: timeoff
      POSTGRES_PASSWORD: timeoff
      POSTGRES_DB: timeoffmanager
    ports:
      - "5432:5432"
    volumes:
      - timeoff-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeoff -d timeoffmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: timeoff-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI (guest / guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: timeoff-mailhog
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # web UI

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timeoff-api
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=timeoffmanager;Username=timeoff;Password=timeoff"
      # Demo-only signing key. In real deployments inject this from a secret store.
      Jwt__Key: "compose-demo-signing-key-please-override-0123456789"
      Jwt__Issuer: "TimeOffManager"
      Jwt__Audience: "TimeOffManager.Clients"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__QueueName: "email-notifications"
      Smtp__Host: "mailhog"
      Smtp__Port: "1025"
      Smtp__FromEmail: "noreply@timeoff.dev"
      Smtp__FromName: "TimeOff Manager"
    ports:
      - "5000:8080"

volumes:
  timeoff-pgdata:
